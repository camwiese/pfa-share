<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a9cbd3"/>
      <stop offset="55%" stop-color="#e3d6bd"/>
      <stop offset="100%" stop-color="#f3ead7"/>
    </linearGradient>
    <radialGradient id="sun" cx="62%" cy="32%" r="22%">
      <stop offset="0%"  stop-color="#ffeec2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffeec2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brassGlow" cx="50%" cy="100%" r="55%">
      <stop offset="0%"  stop-color="#c4934d" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c4934d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Paper / sky base -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#sun)"/>
  <rect width="1200" height="630" fill="url(#brassGlow)"/>

  <!-- Ornamental brass borders (program plate) -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c4934d" stroke-width="1.4" opacity="0.85"/>
  <rect x="55" y="55" width="1090" height="520" fill="none" stroke="#c4934d" stroke-width="0.5" opacity="0.55"/>

  <!-- Corner ornaments -->
  <g stroke="#c4934d" stroke-width="1" opacity="0.7" stroke-linecap="round">
    <line x1="72" y1="80"  x2="92" y2="80"/>
    <line x1="80" y1="72"  x2="80" y2="92"/>
    <line x1="1108" y1="80" x2="1128" y2="80"/>
    <line x1="1120" y1="72" x2="1120" y2="92"/>
    <line x1="72" y1="550" x2="92" y2="550"/>
    <line x1="80" y1="542" x2="80" y2="562"/>
    <line x1="1108" y1="550" x2="1128" y2="550"/>
    <line x1="1120" y1="542" x2="1120" y2="562"/>
  </g>

  <!-- Lagoon arc -->
  <path d="M 200 500 Q 600 555 1000 500" stroke="#6f9fa0" stroke-width="2.4" fill="none" opacity="0.7"/>
  <path d="M 260 514 Q 600 547 940 514" stroke="#6f9fa0" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Palace silhouette: rotunda + colonnade -->
  <g transform="translate(440, 0)">
    <!-- Dome -->
    <path d="M 50 430 Q 160 320 270 430 L 270 458 L 50 458 Z" fill="#262016" opacity="0.78"/>
    <!-- Crown dot -->
    <circle cx="160" cy="332" r="3.5" fill="#262016" opacity="0.85"/>
    <!-- Colonnade ground -->
    <rect x="40" y="458" width="240" height="3" fill="#262016" opacity="0.85"/>
    <!-- Columns -->
    <g fill="#262016" opacity="0.78">
      <rect x="55" y="461" width="4" height="24"/>
      <rect x="75" y="461" width="4" height="24"/>
      <rect x="95" y="461" width="4" height="24"/>
      <rect x="115" y="461" width="4" height="24"/>
      <rect x="148" y="461" width="24" height="24"/>
      <rect x="201" y="461" width="4" height="24"/>
      <rect x="221" y="461" width="4" height="24"/>
      <rect x="241" y="461" width="4" height="24"/>
      <rect x="261" y="461" width="4" height="24"/>
    </g>
    <!-- Base line -->
    <rect x="40" y="485" width="240" height="2" fill="#262016" opacity="0.78"/>
  </g>

  <!-- Civic seal mark (wordmark area) -->
  <g transform="translate(90, 100)">
    <circle cx="22" cy="0" r="22" fill="none" stroke="#c4934d" stroke-width="1.6"/>
    <circle cx="22" cy="0" r="18" fill="none" stroke="#c4934d" stroke-width="0.6" opacity="0.6"/>
    <!-- mini dome inside seal -->
    <path d="M 14 6 Q 22 -6 30 6 Z" fill="#c4934d" opacity="0.85"/>
    <line x1="14" y1="6" x2="30" y2="6" stroke="#c4934d" stroke-width="0.6"/>
    <text x="62" y="6" font-family="Inter, Helvetica, sans-serif" font-size="17" letter-spacing="6" fill="#262016" font-weight="500">FUTURE PALACE</text>
  </g>

  <!-- Title -->
  <g font-family="Fraunces, Georgia, serif" fill="#262016" font-weight="400">
    <text x="90" y="240" font-size="64" letter-spacing="-1.6">What if San Francisco</text>
    <text x="90" y="300" font-size="64" letter-spacing="-1.6">had a place where the future felt</text>
    <text x="90" y="360" font-size="64" letter-spacing="-1.6" font-style="italic">exciting again?</text>
  </g>

  <!-- Caption strip footer -->
  <line x1="90" y1="540" x2="430" y2="540" stroke="#c4934d" stroke-width="0.7" opacity="0.7"/>
  <text x="90" y="562" font-family="Inter, Helvetica, sans-serif" font-size="11" letter-spacing="4" fill="#5c5142" font-weight="500">A PROJECT BY THE WORLD&#39;S FAIR COMPANY · SAN FRANCISCO · 2026</text>

  <!-- Right-side ruler ornament -->
  <g stroke="#c4934d" opacity="0.55">
    <line x1="1085" y1="120" x2="1085" y2="490" stroke-width="0.6"/>
  </g>
  <g stroke="#c4934d" opacity="0.6" stroke-width="0.7" stroke-linecap="round">
    <line x1="1070" y1="120" x2="1085" y2="120"/>
    <line x1="1078" y1="140" x2="1085" y2="140"/>
    <line x1="1078" y1="160" x2="1085" y2="160"/>
    <line x1="1078" y1="180" x2="1085" y2="180"/>
    <line x1="1078" y1="200" x2="1085" y2="200"/>
    <line x1="1070" y1="220" x2="1085" y2="220"/>
    <line x1="1078" y1="240" x2="1085" y2="240"/>
    <line x1="1078" y1="260" x2="1085" y2="260"/>
    <line x1="1078" y1="280" x2="1085" y2="280"/>
    <line x1="1078" y1="300" x2="1085" y2="300"/>
    <line x1="1070" y1="320" x2="1085" y2="320"/>
    <line x1="1078" y1="340" x2="1085" y2="340"/>
    <line x1="1078" y1="360" x2="1085" y2="360"/>
    <line x1="1078" y1="380" x2="1085" y2="380"/>
    <line x1="1078" y1="400" x2="1085" y2="400"/>
    <line x1="1070" y1="420" x2="1085" y2="420"/>
    <line x1="1078" y1="440" x2="1085" y2="440"/>
    <line x1="1078" y1="460" x2="1085" y2="460"/>
    <line x1="1078" y1="480" x2="1085" y2="480"/>
  </g>
</svg>
